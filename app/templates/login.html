<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    background: linear-gradient(to right, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    color: white;
}

.login-box {
    background: rgba(255,255,255,0.12);
    padding: 35px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
    box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    height: 40px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    padding: 10px;
    font-size: 14px;
    box-sizing: border-box;
}

button {
    width: 100%;
    height: 40px;
    margin-top: 10px;
    background: #ff7b54;
    border: none;
    color: white;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff5c33;
}

/* ERROR MESSAGE */
.error {
    color: #ffcccc;
    font-size: 13px;
    margin-bottom: 10px;
}

/* SIGNUP LINK */
.signup-link {
    margin-top: 15px;
    font-size: 14px;
}

.signup-link a {
    color: #ffd700;
    text-decoration: none;
    font-weight: bold;
}

.signup-link a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="login-box">

<h2>🔐 Login</h2>

<!-- 🔥 ERROR MESSAGE -->
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<!-- 🔥 SIGNUP LINK -->
<div class="signup-link">
    Don't have an account? <a href="/signup">Signup</a>
</div>

</div>

</body>
</html>
