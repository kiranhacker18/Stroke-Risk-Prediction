<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
body {
    background: #0f8f6f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
}

/* CARD */
.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
}

/* TITLE */
h2 {
    margin-bottom: 20px;
}

/* INPUTS */
input {
    width: 100%;
    height: 42px;
    margin: 10px 0;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* BUTTON */
button {
    width: 100%;
    height: 42px;
    background: #0f8f6f;
    border: none;
    color: white;
    border-radius: 6px;
    font-size: 15px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #0c745b;
}

/* LINK */
a {
    color: #0f8f6f;
    text-decoration: none;
    font-weight: bold;
}

/* ERROR MESSAGE */
.error {
    color: red;
    font-size: 14px;
}

/* SUCCESS MESSAGE */
.success {
    color: green;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h2>Signup</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if message %}
<p class="success">{{ message }}</p>
{% endif %}

<form method="post">

<input type="text" name="username" placeholder="Enter your email" required>

<input type="password" name="password" placeholder="Create a password" required>

<input type="password" name="confirm_password" placeholder="Confirm your password" required>

<button type="submit">Signup</button>

</form>

<p style="margin-top:15px;">
Already have an account? 
<a href="/login">Login</a>
</p>

</div>

</body>
</html>
